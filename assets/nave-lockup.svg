<svg width="1000" height="380" viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" role="img" aria-label="Nave">
  <!-- horizontal lockup for LIGHT backgrounds: black saucer + green dome + black wordmark -->
  <g transform="translate(20,30) scale(0.62)">
    <rect x="192" y="352" width="128" height="32" fill="#1FE07A" fill-opacity="0.45"/>
    <rect x="160" y="384" width="192" height="32" fill="#1FE07A" fill-opacity="0.25"/>
    <!-- saucer body (black, so it reads on white) -->
    <rect x="64"  y="256" width="384" height="32" fill="#0B0B0B"/>
    <rect x="0"   y="288" width="512" height="32" fill="#0B0B0B"/>
    <rect x="128" y="320" width="256" height="32" fill="#0B0B0B"/>
    <!-- rim lights (green) -->
    <rect x="96"  y="288" width="32" height="32" fill="#1FE07A"/>
    <rect x="224" y="288" width="32" height="32" fill="#1FE07A"/>
    <rect x="352" y="288" width="32" height="32" fill="#1FE07A"/>
    <!-- dome (green) -->
    <rect x="224" y="96"  width="64"  height="32" fill="#1FE07A"/>
    <rect x="192" y="128" width="128" height="32" fill="#1FE07A"/>
    <rect x="160" y="160" width="192" height="32" fill="#1FE07A"/>
    <rect x="160" y="192" width="32"  height="32" fill="#1FE07A"/>
    <rect x="224" y="192" width="64"  height="32" fill="#1FE07A"/>
    <rect x="320" y="192" width="32"  height="32" fill="#1FE07A"/>
    <rect x="128" y="224" width="256" height="32" fill="#1FE07A"/>
    <!-- eyes (white, so they read on the black dome? dome is green) -->
    <rect x="192" y="192" width="32" height="32" fill="#0B0B0B"/>
    <rect x="288" y="192" width="32" height="32" fill="#0B0B0B"/>
  </g>
  <text x="372" y="252" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="190" font-weight="800" letter-spacing="-8" fill="#0B0B0B" shape-rendering="auto">nave</text>
  <rect x="892" y="120" width="32" height="124" fill="#1FE07A"/>
</svg>
