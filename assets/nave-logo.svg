<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" role="img" aria-label="Nave">
  <!-- app-icon: black tile · white saucer · green dome (black/white/green) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0B0B0B"/>
  <g transform="translate(51.2,51.2) scale(0.8)" shape-rendering="crispEdges">
    <!-- tractor beam -->
    <rect x="192" y="352" width="128" height="32" fill="#1FE07A" fill-opacity="0.40"/>
    <rect x="160" y="384" width="192" height="32" fill="#1FE07A" fill-opacity="0.20"/>
    <!-- saucer body (white) -->
    <rect x="64"  y="256" width="384" height="32" fill="#FFFFFF"/>
    <rect x="0"   y="288" width="512" height="32" fill="#FFFFFF"/>
    <rect x="128" y="320" width="256" height="32" fill="#FFFFFF"/>
    <!-- rim lights (green) -->
    <rect x="96"  y="288" width="32" height="32" fill="#1FE07A"/>
    <rect x="224" y="288" width="32" height="32" fill="#1FE07A"/>
    <rect x="352" y="288" width="32" height="32" fill="#1FE07A"/>
    <!-- dome (green) -->
    <rect x="224" y="96"  width="64"  height="32" fill="#1FE07A"/>
    <rect x="192" y="128" width="128" height="32" fill="#1FE07A"/>
    <rect x="160" y="160" width="192" height="32" fill="#1FE07A"/>
    <rect x="160" y="192" width="32"  height="32" fill="#1FE07A"/>
    <rect x="224" y="192" width="64"  height="32" fill="#1FE07A"/>
    <rect x="320" y="192" width="32"  height="32" fill="#1FE07A"/>
    <rect x="128" y="224" width="256" height="32" fill="#1FE07A"/>
    <!-- cute eyes (black, on the green dome) -->
    <rect x="192" y="192" width="32" height="32" fill="#0B0B0B"/>
    <rect x="288" y="192" width="32" height="32" fill="#0B0B0B"/>
  </g>
</svg>
